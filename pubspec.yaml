name: myrun
description: RunNow iOS-first running journal synced from Strava.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  app_links: ^7.1.1
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  google_sign_in: ^7.2.0
  go_router: ^17.2.3
  intl: ^0.20.2
  share_plus: ^13.1.0
  url_launcher: ^6.3.2
  flutter_secure_storage: ^10.3.1
  http: ^1.1.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  fonts:
    - family: Exo 2
      fonts:
        - asset: assets/fonts/exo2/Exo2-Variable.ttf
